<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolaven Volcanic Coffee — Brand Strategy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  /* ── LIGHT PALETTE ── */
  --bg-page:    #faf7f2;
  --bg-surface: #f3ede3;
  --bg-card:    #ede5d8;
  --bg-deep:    #e5dace;
  --border:     #d4c8b5;
  --border-l:   #e8dfd0;

  /* ── TEXT ── */
  --ink:        #1a1208;
  --ink-2:      #3d2e1e;
  --ink-3:      #6b5440;
  --ink-muted:  #8a7260;

  /* ── ACCENT ── */
  --amber:      #a85e1a;
  --amber-l:    #c8751e;
  --amber-g:    #d4893a;
  --gold:       #9a6e10;
  --teal:       #0f5e44;
  --teal-l:     #1a7a58;
  --coral-l:    #b54a2a;

  /* ── LEGACY aliases kept for SVGs ── */
  --obsidian:   #faf7f2;
  --volcanic:   #f3ede3;
  --deep:       #ede5d8;
  --char:       #e5dace;
  --ember:      #d4c8b5;
  --cream:      #1a1208;
  --parch:      #3d2e1e;
  --ash:        #4a3828;
  --stone:      #6b5440;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg-page);}
body{font-family:'Crimson Pro',Georgia,serif;color:var(--ink);}

/* ── NO GRAIN ON LIGHT BG ── */

/* ── LAYOUT ── */
#app{display:flex;height:100vh;width:100vw;}

/* ── SIDEBAR ── */
#sidebar{width:280px;min-width:280px;background:var(--bg-surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;transition:width .3s;}
#sidebar.collapsed{width:64px;min-width:64px;}

#sidebar-header{padding:28px 24px 20px;border-bottom:1px solid var(--border);}
.brand-mark{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;
  letter-spacing:.1em;color:var(--amber);text-transform:uppercase;white-space:nowrap;overflow:hidden;}
.brand-mark span{color:var(--ink);font-weight:300;}
.brand-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--ink-muted);
  text-transform:uppercase;margin-top:4px;white-space:nowrap;overflow:hidden;}

#sidebar.collapsed .brand-mark,
#sidebar.collapsed .brand-sub,
#sidebar.collapsed .nav-label,
#sidebar.collapsed .nav-section-title{display:none;}

#nav{flex:1;overflow-y:auto;padding:12px 0;}
#nav::-webkit-scrollbar{width:2px;}
#nav::-webkit-scrollbar-thumb{background:var(--border);}

.nav-section-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;
  text-transform:uppercase;color:var(--ink-muted);padding:16px 24px 6px;opacity:.8;}

.nav-item{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer;
  transition:all .2s;border-left:2px solid transparent;position:relative;}
.nav-item:hover{background:rgba(168,94,26,.08);border-left-color:rgba(168,94,26,.35);}
.nav-item.active{background:rgba(168,94,26,.12);border-left-color:var(--amber);}
.nav-item.active .nav-label{color:var(--amber);}
.nav-item.active .nav-num{color:var(--amber);}

.nav-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-muted);
  width:20px;text-align:right;flex-shrink:0;}
.nav-label{font-family:'Crimson Pro',serif;font-size:15px;color:var(--ink-3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}

#sidebar-toggle{padding:16px 20px;border-top:1px solid var(--border-l);cursor:pointer;
  display:flex;align-items:center;gap:10px;transition:all .2s;}
#sidebar-toggle:hover{background:rgba(168,94,26,.06);}
#toggle-icon{font-size:14px;color:var(--ink-muted);transition:transform .3s;flex-shrink:0;}
#sidebar.collapsed #toggle-icon{transform:rotate(180deg);}
#toggle-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--ink-muted);}
#sidebar.collapsed #toggle-label{display:none;}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOP BAR ── */
#topbar{height:54px;background:var(--bg-surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 32px;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:20px;}
#slide-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:var(--ink);}
#slide-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--amber);background:rgba(168,94,26,.1);
  border:1px solid rgba(168,94,26,.3);padding:4px 12px;}
.topbar-right{display:flex;align-items:center;gap:16px;}
#progress-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-muted);letter-spacing:.1em;}
.nav-btn{background:transparent;border:1px solid var(--border);color:var(--ink-3);
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;padding:7px 16px;
  cursor:pointer;transition:all .2s;text-transform:uppercase;}
.nav-btn:hover{border-color:var(--amber);color:var(--amber);background:rgba(168,94,26,.05);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}

/* ── PROGRESS BAR ── */
#progress-bar{height:3px;background:var(--border-l);flex-shrink:0;}
#progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--amber-g));
  transition:width .4s ease;}

/* ── SLIDE AREA ── */
#slides{flex:1;overflow:hidden;position:relative;background:var(--bg-page);}
.slide{position:absolute;inset:0;overflow-y:auto;padding:48px 60px 40px;
  opacity:0;transform:translateY(20px);transition:opacity .4s ease,transform .4s ease;
  pointer-events:none;}
.slide.active{opacity:1;transform:translateY(0);pointer-events:all;}
.slide::-webkit-scrollbar{width:4px;}
.slide::-webkit-scrollbar-thumb{background:var(--border);}

/* ── SLIDE TYPOGRAPHY ── */
.eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--amber);margin-bottom:12px;}
.slide-h1{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,4.5vw,62px);
  font-weight:300;line-height:1.08;letter-spacing:-.01em;margin-bottom:20px;color:var(--ink);}
.slide-h1 em{font-style:italic;color:var(--amber-l);}
.slide-h2{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;
  color:var(--amber);margin-bottom:12px;margin-top:36px;padding-bottom:8px;
  border-bottom:2px solid rgba(168,94,26,.2);}
.slide-h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;
  color:var(--teal);margin-bottom:8px;margin-top:24px;}
.slide-p{font-size:19px;color:var(--ink-2);line-height:1.8;font-weight:300;
  max-width:820px;margin-bottom:16px;}
.slide-p strong{color:var(--ink);font-weight:500;}
.amber-rule{height:2px;background:linear-gradient(90deg,transparent,rgba(168,94,26,.3),transparent);
  margin:32px 0;}

/* ── CALLOUT ── */
.callout{border:1px solid rgba(168,94,26,.3);background:rgba(168,94,26,.07);
  padding:22px 26px;margin:20px 0;max-width:820px;border-left:4px solid var(--amber);}
.callout.teal{border-color:rgba(26,122,88,.3);background:rgba(26,122,88,.06);border-left-color:var(--teal-l);}
.callout.coral{border-color:rgba(181,74,42,.3);background:rgba(181,74,42,.06);border-left-color:var(--coral-l);}
.callout-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--amber);margin-bottom:10px;}
.callout.teal .callout-label{color:var(--teal-l);}
.callout.coral .callout-label{color:var(--coral-l);}
.callout-text{font-size:17px;color:var(--ink-2);line-height:1.75;font-weight:300;}

/* ── GRID LAYOUTS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0;max-width:900px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:20px 0;max-width:900px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:20px 0;max-width:900px;}

/* ── CARDS ── */
.card{background:var(--bg-card);border:1px solid var(--border);
  padding:22px;transition:border-color .25s,box-shadow .25s;}
.card:hover{border-color:rgba(168,94,26,.4);box-shadow:0 2px 12px rgba(168,94,26,.08);}
.card-icon{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--amber);margin-bottom:10px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;
  color:var(--ink);margin-bottom:8px;}
.card-body{font-size:15px;color:var(--ink-2);line-height:1.75;}
.card-num{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;
  color:var(--amber-l);line-height:1;margin-bottom:6px;}
.card-num-unit{font-family:'DM Mono',monospace;font-size:13px;color:var(--amber);}

/* ── TIER CARDS ── */
.tier-card{background:var(--bg-card);border:1px solid var(--border);
  padding:18px 22px;display:flex;gap:16px;align-items:flex-start;margin:6px 0;
  transition:all .2s;cursor:default;max-width:820px;}
.tier-card:hover{border-color:rgba(168,94,26,.4);background:rgba(168,94,26,.05);}
.tier-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.tier-content{}
.tier-name{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;
  color:var(--ink);margin-bottom:2px;}
.tier-req{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;
  color:var(--ink-muted);text-transform:uppercase;margin-bottom:6px;}
.tier-perks{font-size:15px;color:var(--ink-2);line-height:1.65;}

/* ── TABLE ── */
.data-table{width:100%;max-width:860px;border-collapse:collapse;margin:20px 0;}
.data-table th{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--amber);background:rgba(168,94,26,.1);
  padding:11px 16px;text-align:left;border-bottom:2px solid rgba(168,94,26,.25);}
.data-table td{padding:11px 16px;font-size:15px;color:var(--ink-2);
  border-bottom:1px solid var(--border-l);vertical-align:top;line-height:1.6;}
.data-table td:first-child{color:var(--ink);font-weight:500;font-size:16px;white-space:nowrap;}
.data-table tr:hover td{background:rgba(168,94,26,.04);}
.data-table tr:last-child td{border-bottom:none;}

/* ── BAR CHART ── */
.bar-row{display:flex;align-items:center;gap:14px;margin:10px 0;}
.bar-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;
  color:var(--ink-2);width:130px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:8px;background:var(--bg-deep);border-radius:4px;max-width:500px;}
.bar-fill{height:100%;border-radius:4px;transition:width 1s ease;}
.bar-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-3);width:50px;}

/* ── PHASE STEPS ── */
.phase-row{display:flex;gap:0;margin:24px 0;max-width:900px;}
.phase-step{flex:1;background:var(--bg-card);border:1px solid var(--border);
  padding:20px;position:relative;transition:all .25s;}
.phase-step:not(:last-child)::after{content:'→';position:absolute;right:-14px;top:50%;
  transform:translateY(-50%);color:var(--amber);font-size:18px;z-index:2;
  background:var(--bg-page);padding:0 4px;}
.phase-step:hover{border-color:rgba(168,94,26,.4);background:rgba(168,94,26,.05);}
.phase-num{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;
  color:var(--amber);text-transform:uppercase;margin-bottom:8px;}
.phase-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ink);margin-bottom:6px;}
.phase-body{font-size:13px;color:var(--ink-3);line-height:1.65;}

/* ── EPISODE LIST ── */
.ep-item{display:flex;gap:20px;padding:16px 0;border-bottom:1px solid var(--border-l);max-width:820px;}
.ep-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--amber);
  width:60px;flex-shrink:0;padding-top:2px;letter-spacing:.1em;}
.ep-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;
  color:var(--ink);margin-bottom:4px;}
.ep-desc{font-size:15px;color:var(--ink-2);line-height:1.65;}

/* ── VENUE LIST ── */
.venue-row{display:flex;gap:20px;align-items:flex-start;padding:14px 0;
  border-bottom:1px solid var(--border-l);max-width:820px;}
.venue-phase{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;
  color:var(--amber);width:120px;flex-shrink:0;padding-top:3px;text-transform:uppercase;}
.venue-detail{font-size:16px;color:var(--ink-2);line-height:1.65;}

/* ── RISK LIST ── */
.risk-item{display:flex;gap:16px;padding:16px 20px;margin:8px 0;
  background:var(--bg-card);border-left:4px solid var(--amber);max-width:820px;}
.risk-item.teal{border-left-color:var(--teal-l);}
.risk-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ink);margin-bottom:4px;}
.risk-body{font-size:15px;color:var(--ink-2);line-height:1.65;}

/* ── COVER SPECIFIC ── */
#slide-0 .cover-layout{display:grid;grid-template-columns:1fr auto;gap:60px;align-items:center;}
.cover-rings{opacity:.35;}
.stat-strip{display:flex;gap:48px;padding-top:28px;border-top:2px solid rgba(168,94,26,.2);margin-top:28px;}
.stat-item .stat-n{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;
  color:var(--amber-l);line-height:1;}
.stat-item .stat-l{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;
  color:var(--ink-muted);text-transform:uppercase;margin-top:4px;}

/* ── PRODUCT TIER VISUAL ── */
.product-tier{background:var(--bg-card);border:1px solid var(--border);
  padding:26px;position:relative;overflow:hidden;}
.product-tier::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;}
.product-tier.t1::before{background:var(--ink-muted);}
.product-tier.t2::before{background:var(--teal-l);}
.product-tier.t3::before{background:var(--gold);}
.pt-tier{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.22em;
  text-transform:uppercase;margin-bottom:12px;}
.t1 .pt-tier{color:var(--ink-muted);}
.t2 .pt-tier{color:var(--teal-l);}
.t3 .pt-tier{color:var(--gold);}
.pt-name{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--ink);margin-bottom:4px;}
.pt-price{font-family:'DM Mono',monospace;font-size:12px;color:var(--amber);margin-bottom:12px;}
.pt-body{font-size:14px;color:var(--ink-2);line-height:1.65;margin-bottom:16px;}
.pt-examples{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-3);line-height:1.9;letter-spacing:.03em;}

/* ── IMPACT METRICS ── */
.impact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;max-width:820px;margin:20px 0;}
.impact-card{background:var(--bg-card);padding:26px;border-bottom:4px solid transparent;border:1px solid var(--border);}
.ic-teal{border-bottom:4px solid var(--teal-l);}
.ic-amber{border-bottom:4px solid var(--amber);}
.ic-gold{border-bottom:4px solid var(--gold);}
.ic-coral{border-bottom:4px solid var(--coral-l);}
.ic-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;
  text-transform:uppercase;margin-bottom:14px;}
.ic-teal .ic-label{color:var(--teal-l);}
.ic-amber .ic-label{color:var(--amber);}
.ic-gold .ic-label{color:var(--gold);}
.ic-coral .ic-label{color:var(--coral-l);}
.ic-num{font-family:'Cormorant Garamond',serif;font-size:50px;font-weight:300;
  line-height:1;color:var(--ink);margin-bottom:8px;}
.ic-desc{font-size:14px;color:var(--ink-2);line-height:1.65;}

/* ── POINTS TABLE ── */
.vp-row{display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid var(--border-l);max-width:700px;}
.vp-action{font-size:16px;color:var(--ink-2);}
.vp-badge{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;
  background:rgba(168,94,26,.1);border:1px solid rgba(168,94,26,.3);
  color:var(--amber);padding:5px 14px;}

/* ── ROADMAP ── */
.roadmap-item{display:flex;gap:24px;padding:14px 0;border-bottom:1px solid var(--border-l);max-width:820px;}
.rm-month{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;
  color:var(--amber);width:110px;flex-shrink:0;padding-top:2px;}
.rm-content{font-size:15px;color:var(--ink-2);line-height:1.65;}

/* ── REVENUE STREAM ── */
.rev-card{background:var(--bg-card);border:1px solid var(--border);
  padding:20px;transition:border-color .2s,box-shadow .2s;}
.rev-card:hover{border-color:rgba(168,94,26,.4);box-shadow:0 2px 10px rgba(168,94,26,.07);}
.rev-name{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ink);margin-bottom:6px;}
.rev-desc{font-size:14px;color:var(--ink-2);line-height:1.65;}

/* ── FINAL SLIDE ── */
.final-center{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;text-align:center;}
.final-quote{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,3vw,38px);
  font-weight:300;font-style:italic;color:var(--ink);line-height:1.4;
  max-width:700px;margin:0 auto;}
.final-attr{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;
  color:var(--amber);text-transform:uppercase;margin-top:24px;}

/* ── MOLECULE ── */
.molecule-stage{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin:20px 0;}
.molecule-card{flex:1;min-width:200px;background:var(--bg-card);border:1px solid var(--border);
  padding:22px;text-align:center;transition:all .25s;}
.molecule-card:hover{border-color:rgba(168,94,26,.4);box-shadow:0 2px 10px rgba(168,94,26,.08);}
.molecule-svg{margin:0 auto 16px;display:block;}
.mol-name{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--ink);margin-bottom:4px;}
.mol-formula{font-family:'DM Mono',monospace;font-size:12px;color:var(--amber);letter-spacing:.1em;margin-bottom:10px;}
.mol-role{font-size:14px;color:var(--ink-2);line-height:1.65;}

/* ── FOUNDER ── */
.founder-grid{display:grid;grid-template-columns:1fr 2fr;gap:48px;align-items:start;max-width:900px;margin:24px 0;}
.founder-emblem{width:120px;height:120px;border:2px solid rgba(168,94,26,.4);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--amber);font-weight:300;
  background:var(--bg-card);}
.founder-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--ink);margin-bottom:6px;}
.founder-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;
  color:var(--amber);text-transform:uppercase;margin-bottom:20px;}
.founder-bio{font-size:17px;color:var(--ink-2);line-height:1.8;font-weight:300;margin-bottom:16px;}
.founder-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:.15em;text-transform:uppercase;border:1px solid rgba(168,94,26,.3);
  color:var(--ink-3);padding:5px 12px;margin:3px;background:var(--bg-card);}

/* ── FINANCIAL ── */
.fin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-width:900px;margin:20px 0;}
.fin-card{background:var(--bg-card);padding:26px;border-top:4px solid transparent;border:1px solid var(--border);}
.fin-y1{border-top:4px solid var(--ink-muted);}
.fin-y2{border-top:4px solid var(--teal-l);}
.fin-y3{border-top:4px solid var(--amber);}
.fin-year{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;
  text-transform:uppercase;margin-bottom:12px;}
.fin-y1 .fin-year{color:var(--ink-muted);}
.fin-y2 .fin-year{color:var(--teal-l);}
.fin-y3 .fin-year{color:var(--amber);}
.fin-rev{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;
  color:var(--ink);line-height:1;margin-bottom:4px;}
.fin-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-muted);
  letter-spacing:.1em;margin-bottom:16px;}
.fin-items{font-size:14px;color:var(--ink-2);line-height:1.85;}

/* ── INVEST ── */
.invest-row{display:flex;gap:4px;max-width:860px;margin:20px 0;}
.invest-block{flex:1;background:var(--bg-card);padding:20px 14px;text-align:center;
  border-bottom:4px solid var(--border);border:1px solid var(--border);}
.invest-block.highlight{border-bottom:4px solid var(--amber);background:rgba(168,94,26,.07);}
.invest-pct{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;
  color:var(--amber-l);line-height:1;margin-bottom:6px;}
.invest-cat{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px;}
.invest-desc{font-size:13px;color:var(--ink-2);line-height:1.55;}

/* ── PLATEAU MAP ── */
.plateau-container{background:rgba(15,94,68,.04);border:1px solid rgba(26,122,88,.2);
  padding:28px;max-width:900px;margin:20px 0;position:relative;}
.plateau-legend{display:flex;gap:24px;margin-top:16px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.12em;color:var(--ink-2);text-transform:uppercase;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── RISK MATRIX ── */
.risk-matrix{display:grid;grid-template-columns:1fr 1fr;gap:4px;max-width:900px;margin:20px 0;}
.risk-cell{background:var(--bg-card);padding:20px;border:1px solid var(--border);}
.risk-cell-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;margin-bottom:8px;}
.risk-cell.r-high .risk-cell-title{color:var(--coral-l);}
.risk-cell.r-med .risk-cell-title{color:var(--amber);}
.risk-cell.r-low .risk-cell-title{color:var(--teal-l);}
.risk-name{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--ink);margin-bottom:4px;}
.risk-mit{font-size:14px;color:var(--ink-2);line-height:1.65;}

/* ── WHY NOW ── */
.why-stat{display:flex;align-items:baseline;gap:16px;padding:16px 0;
  border-bottom:1px solid var(--border-l);max-width:820px;}
.why-num{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;
  color:var(--amber-l);line-height:1;flex-shrink:0;width:130px;text-align:right;}
.why-label{font-size:17px;color:var(--ink-2);line-height:1.65;}
.why-label strong{color:var(--ink);font-weight:500;}

/* ── COMP LANDSCAPE ── */
.comp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-width:900px;margin:20px 0;}
.comp-card{background:var(--bg-card);padding:18px 14px;text-align:center;
  border-top:3px solid var(--border);transition:all .2s;border:1px solid var(--border);}
.comp-card.bolaven{border-top:3px solid var(--amber);background:rgba(168,94,26,.07);}
.comp-name{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--ink);margin-bottom:8px;}
.comp-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;
  color:var(--amber);text-transform:uppercase;margin-bottom:10px;}
.comp-card.bolaven .comp-tag{color:var(--amber-l);}
.comp-dot-row{display:flex;flex-direction:column;gap:5px;align-items:flex-start;text-align:left;}
.comp-dot{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-muted);}
.comp-dot span{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.comp-dot.yes{color:var(--teal);}
.comp-dot.yes span{background:var(--teal-l);}
.comp-dot.no span{background:var(--border);opacity:.8;}
.comp-dot.part span{background:var(--amber);opacity:.7;}

/* ── ANIMATIONS ── */
.slide.active .eyebrow{animation:fadeUp .5s ease forwards;}
.slide.active .slide-h1{animation:fadeUp .5s ease .1s both;}
.slide.active .slide-p:first-of-type{animation:fadeUp .5s ease .2s both;}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}
.bar-fill{width:0;}

  text-transform:uppercase;margin-top:4px;white-space:nowrap;overflow:hidden;}

#sidebar.collapsed .brand-mark,
#sidebar.collapsed .brand-sub,
#sidebar.collapsed .nav-label,
#sidebar.collapsed .nav-section-title{display:none;}

#nav{flex:1;overflow-y:auto;padding:12px 0;}
#nav::-webkit-scrollbar{width:2px;}
#nav::-webkit-scrollbar-thumb{background:var(--ember);}

.nav-section-title{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.25em;
  text-transform:uppercase;color:var(--stone);padding:16px 24px 6px;opacity:.7;}

.nav-item{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer;
  transition:all .2s;border-left:2px solid transparent;position:relative;}
.nav-item:hover{background:rgba(200,117,42,.06);border-left-color:rgba(200,117,42,.3);}
.nav-item.active{background:rgba(200,117,42,.1);border-left-color:var(--amber);}
.nav-item.active .nav-label{color:var(--amber-l);}
.nav-item.active .nav-num{color:var(--amber);}

.nav-num{font-family:'DM Mono',monospace;font-size:9px;color:var(--stone);
  width:20px;text-align:right;flex-shrink:0;}
.nav-label{font-family:'Crimson Pro',serif;font-size:14px;color:var(--ash);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}

#sidebar-toggle{padding:16px 20px;border-top:1px solid rgba(200,117,42,.08);cursor:pointer;
  display:flex;align-items:center;gap:10px;transition:all .2s;}
#sidebar-toggle:hover{background:rgba(200,117,42,.05);}
#toggle-icon{font-size:14px;color:var(--stone);transition:transform .3s;flex-shrink:0;}
#sidebar.collapsed #toggle-icon{transform:rotate(180deg);}
#toggle-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--stone);}
#sidebar.collapsed #toggle-label{display:none;}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOP BAR ── */
#topbar{height:52px;background:rgba(13,10,8,.9);border-bottom:1px solid rgba(200,117,42,.1);
  display:flex;align-items:center;justify-content:space-between;padding:0 32px;
  backdrop-filter:blur(12px);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:20px;}
#slide-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--cream);}
#slide-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--amber);background:rgba(200,117,42,.1);
  border:1px solid rgba(200,117,42,.25);padding:3px 10px;}
.topbar-right{display:flex;align-items:center;gap:16px;}
#progress-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--stone);letter-spacing:.1em;}
.nav-btn{background:transparent;border:1px solid rgba(200,117,42,.2);color:var(--ash);
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;
  cursor:pointer;transition:all .2s;text-transform:uppercase;}
.nav-btn:hover{border-color:var(--amber);color:var(--amber);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}

/* ── PROGRESS BAR ── */
#progress-bar{height:2px;background:rgba(200,117,42,.1);flex-shrink:0;}
#progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--amber-g));
  transition:width .4s ease;}

/* ── SLIDE AREA ── */
#slides{flex:1;overflow:hidden;position:relative;}
.slide{position:absolute;inset:0;overflow-y:auto;padding:48px 56px 40px;
  opacity:0;transform:translateY(20px);transition:opacity .4s ease,transform .4s ease;
  pointer-events:none;}
.slide.active{opacity:1;transform:translateY(0);pointer-events:all;}
.slide::-webkit-scrollbar{width:3px;}
.slide::-webkit-scrollbar-thumb{background:var(--ember);}

/* ── SLIDE TYPOGRAPHY ── */
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--amber);margin-bottom:12px;}
.slide-h1{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,4.5vw,58px);
  font-weight:300;line-height:1.08;letter-spacing:-.01em;margin-bottom:20px;}
.slide-h1 em{font-style:italic;color:var(--amber-l);}
.slide-h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;
  color:var(--amber-l);margin-bottom:12px;margin-top:36px;padding-bottom:8px;
  border-bottom:1px solid rgba(200,117,42,.15);}
.slide-h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;
  color:var(--teal-l);margin-bottom:8px;margin-top:24px;}
.slide-p{font-size:17px;color:var(--ash);line-height:1.8;font-weight:300;
  max-width:820px;margin-bottom:16px;}
.slide-p strong{color:var(--cream);font-weight:400;}
.amber-rule{height:1px;background:linear-gradient(90deg,transparent,rgba(200,117,42,.4),transparent);
  margin:32px 0;}

/* ── CALLOUT ── */
.callout{border:1px solid rgba(200,117,42,.25);background:rgba(200,117,42,.06);
  padding:24px 28px;margin:24px 0;max-width:820px;}
.callout.teal{border-color:rgba(45,158,120,.3);background:rgba(45,158,120,.05);}
.callout.coral{border-color:rgba(212,114,74,.3);background:rgba(212,114,74,.05);}
.callout-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--amber);margin-bottom:10px;}
.callout.teal .callout-label{color:var(--teal-l);}
.callout.coral .callout-label{color:var(--coral-l);}
.callout-text{font-size:16px;color:var(--parch);line-height:1.75;font-weight:300;}

/* ── GRID LAYOUTS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:24px 0;max-width:900px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:24px 0;max-width:900px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:24px 0;max-width:900px;}

/* ── CARDS ── */
.card{background:rgba(28,18,8,.6);border:1px solid rgba(200,117,42,.1);
  padding:24px;transition:border-color .25s;}
.card:hover{border-color:rgba(200,117,42,.3);}
.card-icon{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--amber);margin-bottom:12px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;
  color:var(--cream);margin-bottom:8px;}
.card-body{font-size:14px;color:var(--ash);line-height:1.7;font-weight:300;}
.card-num{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;
  color:var(--amber-l);line-height:1;margin-bottom:6px;}
.card-num-unit{font-family:'DM Mono',monospace;font-size:12px;color:var(--amber);}

/* ── TIER CARDS ── */
.tier-card{background:rgba(28,18,8,.8);border:1px solid rgba(200,117,42,.12);
  padding:20px 24px;display:flex;gap:16px;align-items:flex-start;margin:8px 0;
  transition:all .2s;cursor:default;max-width:820px;}
.tier-card:hover{border-color:rgba(200,117,42,.35);background:rgba(200,117,42,.05);}
.tier-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.tier-content{}
.tier-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;
  color:var(--cream);margin-bottom:2px;}
.tier-req{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;
  color:var(--stone);text-transform:uppercase;margin-bottom:6px;}
.tier-perks{font-size:14px;color:var(--ash);line-height:1.6;}

/* ── TABLE ── */
.data-table{width:100%;max-width:820px;border-collapse:collapse;margin:20px 0;}
.data-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--amber);background:rgba(200,117,42,.08);
  padding:10px 16px;text-align:left;border-bottom:1px solid rgba(200,117,42,.2);}
.data-table td{padding:10px 16px;font-size:14px;color:var(--ash);
  border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;line-height:1.6;}
.data-table td:first-child{color:var(--cream);font-weight:400;font-size:15px;
  white-space:nowrap;}
.data-table tr:hover td{background:rgba(200,117,42,.03);}

/* ── BAR CHART ── */
.bar-row{display:flex;align-items:center;gap:14px;margin:10px 0;}
.bar-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;
  color:var(--ash);width:120px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;
  max-width:500px;}
.bar-fill{height:100%;border-radius:3px;transition:width 1s ease;}
.bar-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--stone);
  width:50px;flex-shrink:0;}

/* ── PHASE STEPS ── */
.phase-row{display:flex;gap:0;margin:24px 0;max-width:900px;}
.phase-step{flex:1;background:rgba(28,18,8,.7);border:1px solid rgba(200,117,42,.1);
  padding:20px;position:relative;transition:all .25s;}
.phase-step:not(:last-child)::after{content:'→';position:absolute;right:-12px;top:50%;
  transform:translateY(-50%);color:var(--amber);font-size:16px;z-index:2;
  background:var(--obsidian);padding:0 2px;}
.phase-step:hover{border-color:rgba(200,117,42,.3);background:rgba(200,117,42,.05);}
.phase-num{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;
  color:var(--amber);text-transform:uppercase;margin-bottom:8px;}
.phase-title{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--cream);
  margin-bottom:6px;}
.phase-body{font-size:12px;color:var(--stone);line-height:1.6;}

/* ── EPISODE LIST ── */
.ep-item{display:flex;gap:20px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.05);
  max-width:820px;}
.ep-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--amber);
  width:60px;flex-shrink:0;padding-top:2px;letter-spacing:.1em;}
.ep-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;
  color:var(--cream);margin-bottom:4px;}
.ep-desc{font-size:14px;color:var(--ash);line-height:1.65;}

/* ── VENUE LIST ── */
.venue-row{display:flex;gap:20px;align-items:flex-start;padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.04);max-width:820px;}
.venue-phase{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;
  color:var(--amber);width:120px;flex-shrink:0;padding-top:3px;text-transform:uppercase;}
.venue-detail{font-size:15px;color:var(--ash);line-height:1.65;}

/* ── RISK LIST ── */
.risk-item{display:flex;gap:16px;padding:16px 20px;margin:8px 0;
  background:rgba(28,18,8,.6);border-left:3px solid var(--amber);max-width:820px;}
.risk-item.teal{border-left-color:var(--teal-l);}
.risk-title{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--cream);
  margin-bottom:4px;}
.risk-body{font-size:14px;color:var(--ash);line-height:1.65;}

/* ── COVER SPECIFIC ── */
#slide-0 .cover-layout{display:grid;grid-template-columns:1fr auto;gap:60px;align-items:center;}
.cover-rings{opacity:.4;}
.stat-strip{display:flex;gap:48px;padding-top:32px;border-top:1px solid rgba(200,117,42,.15);margin-top:32px;}
.stat-item .stat-n{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;
  color:var(--amber-l);line-height:1;}
.stat-item .stat-l{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;
  color:var(--stone);text-transform:uppercase;margin-top:4px;}

/* ── PRODUCT TIER VISUAL ── */
.product-tier{background:linear-gradient(135deg,rgba(28,18,8,.9),rgba(20,14,9,.9));
  border:1px solid rgba(200,117,42,.15);padding:28px;position:relative;overflow:hidden;}
.product-tier::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.product-tier.t1::before{background:var(--stone);}
.product-tier.t2::before{background:var(--teal-l);}
.product-tier.t3::before{background:var(--gold);}
.pt-tier{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;
  text-transform:uppercase;margin-bottom:12px;}
.t1 .pt-tier{color:var(--stone);}
.t2 .pt-tier{color:var(--teal-l);}
.t3 .pt-tier{color:var(--gold);}
.pt-name{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream);
  margin-bottom:4px;}
.pt-price{font-family:'DM Mono',monospace;font-size:12px;color:var(--amber);
  margin-bottom:12px;}
.pt-body{font-size:13px;color:var(--stone);line-height:1.65;margin-bottom:16px;}
.pt-examples{font-family:'DM Mono',monospace;font-size:10px;color:var(--ash);
  line-height:1.8;letter-spacing:.03em;}

/* ── IMPACT METRICS ── */
.impact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px;max-width:820px;margin:24px 0;}
.impact-card{background:rgba(20,14,9,.8);padding:28px;border-bottom:3px solid transparent;}
.ic-teal{border-bottom-color:var(--teal-l);}
.ic-amber{border-bottom-color:var(--amber);}
.ic-gold{border-bottom-color:var(--gold);}
.ic-coral{border-bottom-color:var(--coral-l);}
.ic-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;margin-bottom:14px;}
.ic-teal .ic-label{color:var(--teal-l);}
.ic-amber .ic-label{color:var(--amber);}
.ic-gold .ic-label{color:var(--gold);}
.ic-coral .ic-label{color:var(--coral-l);}
.ic-num{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;
  line-height:1;color:var(--cream);margin-bottom:8px;}
.ic-desc{font-size:13px;color:var(--stone);line-height:1.6;}

/* ── POINTS TABLE ── */
.vp-row{display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);max-width:700px;}
.vp-action{font-size:15px;color:var(--ash);}
.vp-badge{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;
  background:rgba(200,117,42,.1);border:1px solid rgba(200,117,42,.25);
  color:var(--amber);padding:4px 12px;}

/* ── ROADMAP ── */
.roadmap-item{display:flex;gap:24px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04);
  max-width:820px;}
.rm-month{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;
  color:var(--amber);width:100px;flex-shrink:0;padding-top:2px;}
.rm-content{font-size:14px;color:var(--ash);line-height:1.65;}

/* ── REVENUE STREAM ── */
.rev-card{background:rgba(20,14,9,.7);border:1px solid rgba(255,255,255,.06);
  padding:20px;transition:border-color .2s;}
.rev-card:hover{border-color:rgba(200,117,42,.25);}
.rev-name{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--cream);
  margin-bottom:6px;}
.rev-desc{font-size:13px;color:var(--stone);line-height:1.6;}

/* ── FINAL SLIDE ── */
.final-center{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;text-align:center;}
.final-quote{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,3vw,36px);
  font-weight:300;font-style:italic;color:var(--cream);line-height:1.4;
  max-width:700px;margin:0 auto;}
.final-attr{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;
  color:var(--amber);text-transform:uppercase;margin-top:24px;}

/* ── MOLECULE ── */
.molecule-stage{display:flex;gap:48px;align-items:flex-start;flex-wrap:wrap;margin:24px 0;}
.molecule-card{flex:1;min-width:200px;background:rgba(20,14,9,.8);border:1px solid rgba(200,117,42,.1);
  padding:24px;text-align:center;transition:border-color .25s;}
.molecule-card:hover{border-color:rgba(200,117,42,.3);}
.molecule-svg{margin:0 auto 16px;display:block;}
.mol-name{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cream);margin-bottom:4px;}
.mol-formula{font-family:'DM Mono',monospace;font-size:11px;color:var(--amber);letter-spacing:.1em;margin-bottom:10px;}
.mol-role{font-size:13px;color:var(--stone);line-height:1.6;}

/* ── FOUNDER ── */
.founder-grid{display:grid;grid-template-columns:1fr 2fr;gap:48px;align-items:start;max-width:900px;margin:32px 0;}
.founder-emblem{width:120px;height:120px;border:1px solid rgba(200,117,42,.3);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--amber);font-weight:300;}

// ── 0. COVER ──────────────────────────────────────────────────────────
{tag:'Cover',title:'Bolaven Volcanic Coffee',html:`
<div class="cover-layout">

// ── 1. OPPORTUNITY ────────────────────────────────────────────────────
{tag:'Market',title:'The Opportunity',html:`

// ── 2. ORIGIN STORY ───────────────────────────────────────────────────
{tag:'Origin',title:'The Origin Story',html:`
<div class="eyebrow">— The Geological Foundation —</div>
<h1 class="slide-h1">790,000 years<br>in the <em>making</em></h1>
<p class="slide-p">Approximately 790,000 years ago, a large meteorite impact created the Australasian tektite strewn field — one of the largest impact debris fields on Earth, spanning from Antarctica to the Indian Ocean. The Bolaven Plateau sits at its geographic heart.</p>
<div class="callout">
  <div class="callout-label">What makes this irreplaceable</div>
  <div class="callout-text">Tektites — glass fragments formed by the impact — have been scientifically documented across the plateau. The volcanic basalt soil, tektite mineral deposits, altitude, and cool night temperatures produce coffee cherries with measurably higher sugar content and more complex acid profiles. This is not a marketing claim. It is peer-reviewed geology.</div>
</div>
<div class="grid-3" style="margin-top:28px;">
  <div class="card">
    <div class="card-icon">Altitude</div>
    <div class="card-num">1,300<span class="card-num-unit">m</span></div>
    <div class="card-body">Growing elevation above sea level. Lower oxygen, intense UV, cooler nights — all concentrating sugar in the cherry over a slower 30–35 week development cycle.</div>
  </div>
  <div class="card">
    <div class="card-icon">Impact age</div>
    <div class="card-num">790K<span class="card-num-unit"> BP</span></div>
    <div class="card-body">Years before present. The Australasian strewn field is one of the most recently formed and largest tektite fields on Earth. Bolaven is at its center.</div>
  </div>
  <div class="card">
    <div class="card-icon">Soil mineral index</div>
    <div class="card-num">4×<span class="card-num-unit"> avg</span></div>
    <div class="card-body">The volcanic basalt soil registers potassium, phosphorus, and magnesium levels significantly above regional averages — each with measurable influence on cup quality.</div>
  </div>
</div>
<div class="slide-h2">Soil Mineral Profile</div>
<div class="bar-row"><div class="bar-label">Potassium</div><div class="bar-track"><div class="bar-fill" style="--w:80%;background:var(--amber);"></div></div><div class="bar-val">0.86%</div></div>
<div class="bar-row"><div class="bar-label">Iron (Fe)</div><div class="bar-track"><div class="bar-fill" style="--w:90%;background:var(--amber-l);"></div></div><div class="bar-val">0.94%</div></div>

// ── 3. BRAND ARCHITECTURE ─────────────────────────────────────────────
{tag:'Brand',title:'Brand Architecture',html:`
<div class="eyebrow">— Brand Identity System —</div>
<h1 class="slide-h1">Three pillars.<br>One <em>coherent</em> system.</h1>
<p class="slide-p">Every element of the brand — the products, the content, the loyalty program, the retail experience — flows from three interconnected pillars. Each pillar reinforces the others. None works without the others.</p>
<div class="grid-3">
  <div class="card">
    <div class="card-icon">Pillar I</div>
    <div class="card-title">Origin</div>

  <div class="card">
    <div class="card-icon">Pillar II</div>
    <div class="card-title">Science</div>

    <div class="card-icon">Pillar III</div>

  </div>
</div>
<div class="slide-h2">Brand Archetypes</div>
<div class="grid-3">
  <div class="card"><div class="card-icon">The Explorer</div><div class="card-body">Discovering the origin — the plateau, the volcanic geology, the farmer stories. Curiosity as the brand's emotional core.</div></div>
  <div class="card"><div class="card-icon">The Scientist</div><div class="card-body">Explaining flavor through chemistry, biology, and data. Roast curves, fermentation pH, soil analysis. Authority built through evidence.</div></div>

{tag:'Passport',title:'The Bolaven Passport',html:`
<div class="eyebrow">— Loyalty Ecosystem —</div>
<h1 class="slide-h1">A data engine.<br>A sustainability vehicle.<br>A <em>content machine</em>.</h1>
<p class="slide-p">The Bolaven Passport is not a points card. It is a system that turns every purchase into a multi-layered engagement event: the customer logs their coffee, earns Volcanic Points, unlocks rewards, triggers verified environmental impact, and contributes to the brand's proprietary Bolaven Coffee Index.</p>
<div class="slide-h2">Five Tiers</div>
<div class="tier-card"><div class="tier-dot" style="background:#6b5c4e;"></div><div class="tier-content"><div class="tier-name">Seedling</div><div class="tier-req">0–2 bags</div><div class="tier-perks">Welcome kit · Digital impact card · QR journal activated · Batch scan access</div></div></div>
<div class="tier-card"><div class="tier-dot" style="background:#3B6D11;"></div><div class="tier-content"><div class="tier-name">Explorer</div><div class="tier-req">3–9 bags</div><div class="tier-perks">Botanical Field Notes booklet (mailed) · Early Science Series access before public availability · 1 coral fragment per active month</div></div></div>
<div class="tier-card"><div class="tier-dot" style="background:#2d9e78;"></div><div class="tier-content"><div class="tier-name">Terroir Seeker</div><div class="tier-req">10–24 bags</div><div class="tier-perks">Virtual cupping invites · Named farmer video content · Harvest previews and pre-orders · 1 tree per bag purchased</div></div></div>
<div class="tier-card"><div class="tier-dot" style="background:#c8752a;"></div><div class="tier-content"><div class="tier-name">Volcanologist</div><div class="tier-req">25–49 bags</div><div class="tier-perks">Physical geological map print · Guaranteed Crater Reserve allocation · Science Quarterly journal · Reforestation hectare co-sponsorship</div></div></div>
<div class="tier-card"><div class="tier-dot" style="background:#d4a843;box-shadow:0 0 10px rgba(212,168,67,.4);"></div><div class="tier-content"><div class="tier-name">Crater Patron</div><div class="tier-req">50+ bags lifetime</div><div class="tier-perks">Named in harvest acknowledgments · Micro-lot first access · Annual on-farm visit · Named Restoration Plot with GPS coordinates and live photography</div></div></div>`},

// ── 8. SUSTAINABILITY ─────────────────────────────────────────────────
{tag:'Impact',title:'Sustainability & Impact',html:`

<h1 class="slide-h1">Every cup <em>restores</em><br>the plateau</h1>
<p class="slide-p">Modeled on OnlyOne and Coral Gardeners. Each purchase triggers a verified real-world action. Impact is individually tracked, independently verified, and reported annually in the Bolaven Impact Report — mailed as a designed object to Volcanologist and Crater Patron members.</p>
<div class="impact-grid">
  <div class="impact-card ic-teal">
    <div class="ic-label">Reforestation</div>
    <div class="ic-num">12,840</div>
    <div class="ic-desc">Native shade trees planted on the Bolaven Plateau. Shade trees improve coffee quality, reduce erosion, restore biodiversity, and sequester carbon. Survival rate: 94% at 12 months.</div>
  </div>

    <div class="ic-label">Farmer Livelihoods</div>

    <div class="ic-label">Carbon Offset (tonnes CO₂)</div>

</div>`},

// ── 9. SCIENCE CONTENT ────────────────────────────────────────────────
{tag:'Content',title:'Science Content Series',html:`
<div class="eyebrow">— Four-Pillar Content Strategy —</div>
<h1 class="slide-h1">Content that builds<br>an <em>uncopiable</em> authority</h1>
<p class="slide-p">Authority can be copied in aesthetics but not in depth. Five years of publishing the Bolaven Coffee Index, the Science Quarterly, and the documentary series creates intellectual territory a competitor would need five years and genuine scientific credibility to enter.</p>
<div class="grid-2">
  <div>
    <div class="slide-h3">Geology — Under the Plateau series</div>
    <p class="slide-p" style="font-size:15px;">8 episodes answering one geological question each. Opens 790,000 years ago. Ends with a farmer holding a tektite at sunrise. The hook no competitor can replicate.</p>
    <div class="slide-h3">Biology — Coffee Cherry Lab series</div>
    <p class="slide-p" style="font-size:15px;">Filmed across a full growing season. Flowering, cherry development, harvesting, fermentation. The Brix refractometer on camera. The biology made tactile and human.</p>
  </div>
  <div>
    <div class="slide-h3">Chemistry — The Roast Curve series</div>
    <p class="slide-p" style="font-size:15px;">Every roasting session filmed with the live temperature probe. Actual roast curve data published per batch. The Maillard reaction, first crack, extraction TDS — real science for real coffee people.</p>
    <div class="slide-h3">Ecology — Restoration Plot series</div>
    <p class="slide-p" style="font-size:15px;">Following specific restoration plots in real time over 3 years. Canopy cover metrics, bird species returning, watershed recovery. The living proof of the brand's promise.</p>
  </div>
</div>
<div class="slide-h2">Content Formats & Cadence</div>
<table class="data-table">
  <thead><tr><th>Format</th><th>Cadence</th><th>Audience</th></tr></thead>
  <tbody>
    <tr><td>Short-form video (60–90 sec)</td><td>2 per week · Instagram, TikTok, YouTube</td><td>Broad — discovery and acquisition</td></tr>
    <tr><td>Science Field Notes cards</td><td>1 per product batch release</td><td>All purchasers — engagement and retention</td></tr>
    <tr><td>Bolaven Science Quarterly</td><td>4 issues per year · print + digital</td><td>Volcanologist+ — deepest loyalty tier</td></tr>
    <tr><td>Annual Crater Reserve film</td><td>1 per year at drop launch</td><td>Global press and community event</td></tr>
    <tr><td>Bolaven Coffee Index</td><td>Annual publication</td><td>Industry, academia, investors, press</td></tr>
  </tbody>
</table>`},

// ── 10. HOSPITALITY ───────────────────────────────────────────────────
{tag:'Hospitality',title:'Hospitality Go-to-Market',html:`
<div class="eyebrow">— B2B & Hospitality Strategy —</div>
<h1 class="slide-h1">The fastest path to<br><em>global legitimacy</em></h1>
<p class="slide-p">The hospitality channel is the fastest path to brand legitimacy and high-margin volume before DTC reaches scale. A placement at Rosewood or Raffles is worth more than any advertising spend.</p>
<div class="slide-h2">Target Segments by Priority</div>
<table class="data-table">
  <thead><tr><th>Tier</th><th>Target Properties</th><th>Timeline</th></tr></thead>
  <tbody>
    <tr><td>Tier C — Local Anchors</td><td>Vientiane premium restaurants, Paksé guesthouses near the plateau, Savannakhet hospitality — generates case studies and photography</td><td>Months 0–6</td></tr>
    <tr><td>Tier B — Strategic Volume</td><td>Boutique hotels in Luang Prabang old town, Bangkok's Thonglor and Ari specialty café scene, high-end Singapore and KL restaurants with SEA sourcing narratives</td><td>Months 6–12</td></tr>
    <tr><td>Tier A — Dream Logos</td><td>Rosewood Luang Prabang, Amanpuri Phuket, Six Senses Con Dao, Park Hyatt Bangkok, Raffles Singapore — share aesthetic DNA with the brand</td><td>Months 12–18</td></tr>
  </tbody>
</table>
<div class="slide-h2">Three Partnership Structures</div>
<div class="grid-3">
  <div class="card"><div class="card-icon">Standard Supply</div><div class="card-title">Wholesale</div><div class="card-body">40–45% below retail. Monthly minimum. Co-branded menu mention required. QR batch tracking for the property's Passport account.</div></div>
  <div class="card"><div class="card-icon">Observatory Partner</div><div class="card-title">Exclusivity by district</div><div class="card-body">Co-branded geological backstory menu card. Seasonal food pairing menus. Staff origin training. The hotel's F&B team become brand ambassadors.</div></div>
  <div class="card"><div class="card-icon">Founding Partner</div><div class="card-title">First 3–5 only</div><div class="card-body">Named permanently on website and press materials. Invited to annual harvest experience on the plateau. Guaranteed Crater Reserve first allocation.</div></div>
</div>
<div class="callout">
  <div class="callout-label">The pitch in one sentence</div>
  <div class="callout-text">Most hotels serve commodity coffee with an origin label. None can tell their guests that the coffee comes from a plateau shaped by a meteorite impact 790,000 years ago, grown at 1,300m in volcanic soil tested for mineral composition — with every purchase contributing to verified reforestation. That is a story a guest retells at the breakfast table. That is the difference between a commodity and an experience.</div>
</div>`},

// ── 11. ROADMAP ───────────────────────────────────────────────────────

  <div class="phase-step"><div class="phase-num">Phase 2 · Months 6–9</div><div class="phase-title">Science Series</div><div class="phase-body">Science Series public launch. Cherry Lab biology series. Science Quarterly Issue 1. Tier B hospitality outreach.</div></div>

<div class="roadmap-item"><div class="rm-month">Month 10–12</div><div class="rm-content">Crater Reserve pre-registration opens · Annual harvest film in production · Tektite Field 790K drop · Annual Impact Report published</div></div>
<div class="roadmap-item"><div class="rm-month">Month 13–18</div><div class="rm-content">Singapore retail pop-up · Bolaven Coffee Index first annual publication · Southeast Asia distribution agreements · Tier A hospitality conversations</div></div>`},

// ── 12. REVENUE MODEL ─────────────────────────────────────────────────
{tag:'Revenue',title:'Revenue Model',html:`
<div class="eyebrow">— Business Model —</div>
<h1 class="slide-h1">Multiple streams.<br>One <em>compounding</em> flywheel.</h1>
<p class="slide-p">The revenue architecture is designed so each stream strengthens the others. DTC subscribers generate Passport data. The data improves product development. Better products drive hospitality placement. Hospitality placement drives DTC discovery.</p>
<div class="grid-2">
  <div class="rev-card"><div class="rev-name">DTC Subscriptions</div><div class="rev-desc">Monthly and quarterly subscription boxes via the Bolaven Passport. Highest customer lifetime value. Subscribers generate the most valuable flavor preference and brewing data.</div></div>
  <div class="rev-card"><div class="rev-name">Hospitality Wholesale</div><div class="rev-desc">Recurring volume from hotel and restaurant partners. Lower margin than DTC but operationally efficient at scale and builds brand prestige in premium spaces.</div></div>
  <div class="rev-card"><div class="rev-name">Crater Reserve Annual Drop</div><div class="rev-desc">200 numbered units. Ultra-premium. Modeled as a high-revenue, high-press cultural event. Scarcity drives demand; demand drives brand equity.</div></div>
  <div class="rev-card"><div class="rev-name">Science Quarterly Membership</div><div class="rev-desc">Standalone journal subscription for non-coffee-buyers: scientists, sustainability professionals, food researchers. Extends brand reach beyond the purchasing base.</div></div>
  <div class="rev-card"><div class="rev-name">Bolaven Coffee Index Licensing</div><div class="rev-desc">Anonymized aggregate data — harvest quality trends, flavor profiles, sustainability metrics — licensed to food & beverage companies, agricultural researchers, and sustainability investors.</div></div>
  <div class="rev-card"><div class="rev-name">Gift Sets & Corporate</div><div class="rev-desc">The Aerobic vs Anaerobic Set and Crater Reserve gift boxes target corporate gifting. High AOV, seasonal spike. Custom branded outer sleeve option for B2B accounts.</div></div>
</div>
<div class="slide-h2">Price Architecture Summary</div>
<table class="data-table" style="max-width:600px;">
  <thead><tr><th>Product</th><th>Price Point</th></tr></thead>
  <tbody>
    <tr><td>Tier 1 — Signature</td><td>$18–28 per 250g</td></tr>
    <tr><td>Tier 2 — Science Series</td><td>$35–55 per 200g</td></tr>
    <tr><td>Tier 3 — Crater Reserve</td><td>$90–180 per 150g</td></tr>
    <tr><td>Subscription (monthly, 2 bags)</td><td>$45–65 per month</td></tr>
    <tr><td>Science Quarterly (annual)</td><td>$48 digital / $95 print</td></tr>
    <tr><td>Gift Sets</td><td>$75–180 per set</td></tr>
  </tbody>
</table>`},

// ── 13. DOCUMENTARY & EXHIBITION ──────────────────────────────────────
{tag:'Cultural',title:'Documentary & Exhibition Strategy',html:`
<div class="eyebrow">— Long-Term Cultural Vision —</div>
<h1 class="slide-h1">Not a coffee brand<br>with content.<br>A <em>cultural institution</em><br>funded by coffee.</h1>
<p class="slide-p">The plan to produce a documentary series for WaterBear and National Geographic, followed by traveling exhibitions, transforms Bolaven from a product company into something that institutional moats take decades to build — and once built, cannot be replicated.</p>
<div class="callout teal">
  <div class="callout-label">The defining strategic inversion</div>
  <div class="callout-text">The documentary series is not marketing for the coffee. The coffee funds the documentary series. WaterBear and NatGeo don't just distribute content — they confer legitimacy. A 6-part series positions Bolaven permanently alongside the world's most respected scientific storytelling. Every frame is brand equity that compounds indefinitely.</div>
</div>
<div class="slide-h2">The 6-Episode Micro-Series</div>
<div class="ep-item"><div class="ep-num">Ep. 01</div><div><div class="ep-title">The Impact</div><div class="ep-desc">The geological origin. Opens 790,000 years ago. Ends with a farmer holding a tektite on the plateau at sunrise. The hook that makes every subsequent episode necessary.</div></div></div>
<div class="ep-item"><div class="ep-num">Ep. 02</div><div><div class="ep-title">The Soil</div><div class="ep-desc">A soil scientist and a farmer together in the field. Real lab results shown on screen. The science made human and tactile.</div></div></div>
<div class="ep-item"><div class="ep-num">Ep. 03</div><div><div class="ep-title">The Cherry</div><div class="ep-desc">The biology of the plant's annual cycle. Filmed across a full growing season — from jasmine-scented flowering to selective harvest.</div></div></div>
<div class="ep-item"><div class="ep-num">Ep. 04</div><div><div class="ep-title">The Fire</div><div class="ep-desc">The roasting science. The roastmaster, the curve, the chemistry. The Maillard reaction explained in front of a live roaster with data on screen.</div></div></div>
<div class="ep-item"><div class="ep-num">Ep. 05</div><div><div class="ep-title">The People</div><div class="ep-desc">The cooperative. Individual farmers, their families, their generational knowledge — and what the brand's direct-trade model means for their livelihoods.</div></div></div>
<div class="ep-item"><div class="ep-num">Ep. 06</div><div><div class="ep-title">The Future</div><div class="ep-desc">The restoration plots, the Science Quarterly, the Observatory vision. Where this is all going — and why it matters beyond coffee.</div></div></div>
<div class="slide-h2">The Traveling Exhibition — "790,000 Years"</div>
<div class="venue-row"><div class="venue-phase">Domestic launch</div><div class="venue-detail">Vientiane cultural space — the founding story told first to the people it belongs to. Generates Lao press and the photography record of the brand's origins.</div></div>
<div class="venue-row"><div class="venue-phase">Regional</div><div class="venue-detail">MAIIAM Contemporary Art Museum, Chiang Mai · Bangkok Art and Culture Centre · ArtScience Museum, Singapore</div></div>
<div class="venue-row"><div class="venue-phase">Global culmination</div><div class="venue-detail">Natural History Museum, London · American Museum of Natural History, New York — the geological narrative earns its place in these institutions on scientific merit alone.</div></div>`},

// ── 14. ASSESSMENT ────────────────────────────────────────────────────
{tag:'Assessment',title:'Overall Assessment',html:`
<div class="eyebrow">— Honest Evaluation —</div>
<h1 class="slide-h1">The ingredients of<br>a <em>genuinely iconic</em> brand</h1>
<p class="slide-p">This is not a me-too premium coffee brand. The geological story is irreplaceable, the three-pillar fusion has never been done at this level, Southeast Asia's moment is now, and the science content strategy builds a moat that deepens every year.</p>
<div class="slide-h2">Where the Real Risks Live</div>
<div class="risk-item"><div class="risk-title">Execution depth is everything</div><div class="risk-body">A half-executed version would be worse than a simpler concept done well. If the geological illustration is mediocre, if the Passport impact metrics are not verified, if the roast curve data is decorative — the intellectual premise collapses. The brand's promise is truth. Every element must earn that claim.</div></div>
<div class="risk-item teal"><div class="risk-title">The loyalty program needs technical investment early</div><div class="risk-body">The QR batch tracking, verified impact metrics, Science Challenge mechanics, and tier unlock system need proper engineering from day one. A loyalty program that launches with broken mechanics damages credibility at the exact moment the brand needs to establish trust.</div></div>
<div class="risk-item"><div class="risk-title">Distribution sequencing is critical</div><div class="risk-body">The brand needs to be slightly hard to find in its early years. A Crater Reserve that sells out in 48 hours is worth ten times one that sits on shelves. Sequence hospitality, retail placements, and DTC growth deliberately.</div></div>
<div class="risk-item teal"><div class="risk-title">Pricing courage will be tested</div><div class="risk-body">There will be pressure to lower prices to drive volume. Premium pricing is not just about margin — it is a brand signal. The moment Crater Reserve is discounted, the market is told what it is actually worth.</div></div>
<div class="amber-rule"></div>
<div class="callout" style="margin-top:8px;">
  <div class="callout-label">The bottom line</div>
  <div class="callout-text">This project has the ingredients of a genuinely iconic brand. The geological origin, the science framework, the sustainability mechanics, the loyalty ecosystem, the packaging art program, the sensory identity, the documentary series — individually each is strong. Together, built with execution discipline, this is a category of one. Continue to the final slides for the complete universe picture.</div>
</div>`}

,

// ── 15. SENSORY IDENTITY ──────────────────────────────────────────────
{tag:'Sensory',title:'Sensory Identity System',html:`
<div class="eyebrow">— Beyond the Cup —</div>
<h1 class="slide-h1">The brand you <em>smell</em><br>before you taste</h1>
<p class="slide-p">Starbucks understood something most coffee brands missed: people don't buy coffee, they buy the feeling of being in a particular kind of place. What Bolaven does goes further — the scent, sound, and texture of the Observatory make people feel they have arrived somewhere geographically and temporally specific. The Bolaven Plateau, at a particular moment in the year.</p>
<div class="callout">
  <div class="callout-label">The strategic insight</div>
  <div class="callout-text">A customer who burns a Bolaven candle in their home in Singapore or London brings the plateau into their daily life — their bedroom, their morning ritual. The coffee is the reason they discovered you. The scent is the reason you become part of their life. The candle and diffuser line is not a gift shop afterthought. It is a Trojan horse.</div>
</div>
<div class="slide-h2">The Four Signature Scents</div>
<div class="grid-2">
  <div class="card">
    <div class="card-icon">Scent 01 — March to April</div>
    <div class="card-title">The Flowering</div>
    <div class="card-body">The plateau in bloom. White jasmine arabica flower, cool highland morning air, wet volcanic earth, green stem, trace of wood smoke from distant farm fires. Emotional register: quiet anticipation. Dawn on the plateau. Something extraordinary about to begin.</div>
  </div>
  <div class="card">
    <div class="card-icon">Scent 02 — November to January</div>
    <div class="card-title">The Harvest</div>
    <div class="card-body">Ripe coffee cherries at peak. Red fruit, sun-warmed volcanic earth, fermentation sweetness, teak wood, distant rain approaching. The most complex and most distinctly Bolaven scent. Emotional register: richness, fulfillment, late afternoon light on the plateau.</div>
  </div>
  <div class="card">
    <div class="card-icon">Scent 03 — Year-round</div>
    <div class="card-title">The Roast</div>
    <div class="card-body">Dark roasted coffee, caramelized sugar, toasted wood, trace of smoke, cedar, the faint mineral sharpness of the volcanic bean. The universally loved scent — but with Bolaven's specific mineral character. Emotional register: warmth, depth, transformation.</div>
  </div>
  <div class="card">
    <div class="card-icon">Scent 04 — The geology</div>
    <div class="card-title">The Stone</div>
    <div class="card-body">Volcanic basalt after rain. Petrichor intensified — deeper, more mineral, ancient. Dark volcanic earth, obsidian, cold altitude air after rain. The most unexpected and most conversation-generating scent. Emotional register: age, depth, the sublime. 790,000 years.</div>
  </div>
</div>
<div class="callout teal" style="margin-top:8px;">
  <div class="callout-label">The fifth scent — annual limited edition</div>
  <div class="callout-text">Released alongside the Crater Reserve drop each year. A blend of all four base scents representing that specific harvest year's character. The scent equivalent of a vintage. Numbered, collectible, never repeated.</div>
</div>`},

// ── 16. SPATIAL SCENT STRATEGY ────────────────────────────────────────
{tag:'Spatial',title:'Spatial Scent & Sound Strategy',html:`
<div class="eyebrow">— Sensory Architecture —</div>
<h1 class="slide-h1">Every space tells<br>the story <em>before</em><br>a word is spoken</h1>
<p class="slide-p">Each Bolaven touchpoint has its own scent identity, designed to reinforce the narrative of that specific moment. The scent shift between spaces is perceptible before the visual change registers — your nose tells you you've entered a different chapter before your eyes do.</p>
<div class="slide-h2">Spatial Scent Deployment</div>
<table class="data-table">
  <thead><tr><th>Space</th><th>Scent Strategy</th><th>Effect</th></tr></thead>
  <tbody>
    <tr><td>Observatory retail</td><td>The Harvest in daytime. The Roast in late afternoon. Timer-controlled transition mirroring the plateau's daily rhythm.</td><td>Dwell time increases. The space feels alive and changing rather than static.</td></tr>
    <tr><td>Hospitality partner</td><td>The Flowering for lobby and breakfast room. The Roast deployed at the exact moment of coffee service.</td><td>The scent cues the arrival of the coffee before the cup appears. A genuinely memorable sequence.</td></tr>
    <tr><td>Exhibition — Room 1</td><td>The Stone</td><td>Visitors feel the geological weight of the place before reading a word about it.</td></tr>
    <tr><td>Exhibition — Room 2</td><td>The Roast</td><td>The chemistry of transformation is felt as well as seen and read.</td></tr>
    <tr><td>Exhibition — Room 3</td><td>The Harvest</td><td>The human and agricultural world of the plateau arrives through the nose.</td></tr>
    <tr><td>Exhibition — Room 4</td><td>The Flowering</td><td>The future chapter opens with freshness and possibility.</td></tr>
    <tr><td>Crater Reserve unboxing</td><td>The Stone lightly scented inside the magnetic box</td><td>When the lid opens, a brief unmistakable moment of volcanic earth arrives before the visual elements. Gone within minutes — feels like a living thing.</td></tr>
    <tr><td>Pop-ups</td><td>Single signature scent matched to the season and primary product</td><td>Each pop-up smells like a specific moment on the plateau.</td></tr>
  </tbody>
</table>
<div class="slide-h2">The Sound Identity — Three Layers</div>
<div class="grid-3">
  <div class="card">
    <div class="card-icon">Layer 1</div>
    <div class="card-title">The Ambient Score</div>
    <div class="card-body">Original commissioned ambient score — not a playlist. Actual field recordings from the plateau woven into composed music. Wind through coffee trees, the roasting drum, Tad Lo waterfall. Visitors feel it as authentic and specific in a way Spotify cannot replicate.</div>
  </div>
  <div class="card">
    <div class="card-icon">Layer 2</div>
    <div class="card-title">Seasonal Variations</div>
    <div class="card-body">Four versions of the score — one per scent, one per agricultural quarter. The Flowering version is lighter, melodic, birdsong. The Roast is deeper and rhythmic with the drum roaster undertone. The space sounds different across the year.</div>
  </div>
  <div class="card">
    <div class="card-icon">Layer 3</div>
    <div class="card-title">The Passport Moment</div>
    <div class="card-body">When a customer scans a bag in-store, a subtle musical signature plays through the space. Brief. Distinct. Not a notification sound — something that becomes unconsciously associated with a positive brand moment over time.</div>
  </div>
</div>`},

// ── 17. PACKAGING ART PROGRAM ─────────────────────────────────────────
{tag:'Art',title:'Packaging Art Program',html:`
<div class="eyebrow">— Science as Canvas —</div>
<h1 class="slide-h1">The actual biology<br>of the bean as<br><em>raw material for art</em></h1>
<p class="slide-p">Most brands commission artists to create something "inspired by" their product. This is different. The microscopic cross-section of an Arabica bean and a Robusta bean under scanning electron microscopy are genuinely, objectively beautiful. We give local Lao artists the actual scientific visual material of the product itself as their canvas.</p>
<div class="callout">
  <div class="callout-label">Why this is an uncopiable moat</div>
  <div class="callout-text">A competitor can hire good designers. They cannot retroactively build ten years of genuine collaborative relationships with Lao artists. They cannot manufacture the authentic provenance of work made by people who are from the place. They cannot replicate the archive that accumulates over time. The art program transforms the packaging from a container into a cultural document.</div>
</div>
<div class="slide-h2">The Species Visual Language</div>
<div class="grid-2">
  <div class="card">
    <div class="card-icon">Arabica cellular structure</div>
    <div class="card-title">Open. Complex. Flowing.</div>
    <div class="card-body">Under the microscope, Arabica shows larger oil cells distributed through the endosperm in patterns that look almost floral. Open and complex — like water, wind, or the unfurling of a fern. Artists working with this material tend naturally toward lyrical, exploratory compositions. Palette: warm amber, deep gold, occasional green where chlorogenic acid concentrates.</div>
  </div>
  <div class="card">
    <div class="card-icon">Robusta cellular structure</div>
    <div class="card-title">Dense. Geometric. Structured.</div>
    <div class="card-body">Robusta under the same magnification is visibly different. Denser, smaller, more uniformly distributed oil cells — the matrix looks architectural. Regular patterns, strong repeated forms, engineered precision. Artists respond with more graphic, bold compositions. Palette: deeper, darker, more intense — reflecting the bean's flavor character.</div>
  </div>
</div>
<div class="slide-h2">Three-Tier Artist Program</div>
<div class="grid-3">
  <div class="card">
    <div class="card-icon">Tier 1</div>
    <div class="card-title">The Founding Collection</div>
    <div class="card-body">3–5 established Lao contemporary artists respond to the microscopy material at launch. Each works with one specific product. Their name, process statement, and the original microscopy specimen number appear inside the packaging. Limited run — when those units sell, the packaging changes.</div>
  </div>
  <div class="card">
    <div class="card-icon">Tier 2</div>
    <div class="card-title">The Annual Commission</div>
    <div class="card-body">One new Lao artist commissioned per year. Spends time on the plateau during harvest. Given that year's specific microscopy imagery. Their exhibition opening IS the harvest packaging launch event. Original artworks sold through the gallery, proceeds supporting the restoration fund.</div>
  </div>
  <div class="card">
    <div class="card-icon">Tier 3</div>
    <div class="card-title">Open Community Program</div>
    <div class="card-body">Annual open submission — any Lao artist, established or emerging, traditional or digital. Selected works used on limited batch Signature packaging. Meaningful fee, full credit, and introduction to an international audience. Talent development and brand building simultaneously.</div>
  </div>
</div>
<div class="callout teal">
  <div class="callout-label">The provenance documentation — same rigour as the coffee</div>
  <div class="callout-text">Every packaging artwork receives a provenance card: artist name and location in Laos, the specific microscopy specimen number they worked from, a statement about their process, and the edition information. The science and the art are documented with equal care — because they are equally important to what the product is.</div>
</div>`},

// ── 18. UNIVERSE EXPANSION ────────────────────────────────────────────
{tag:'Universe',title:'The Bolaven Universe',html:`
<div class="eyebrow">— One Origin. Many Entry Points. —</div>
<h1 class="slide-h1">Not two businesses.<br>One <em>universe</em>.</h1>
<p class="slide-p">The skincare and perfume line — built on the chemistry and biology of ingredients, rooted in the same volcanic plateau — is not a brand extension. It is a second entry point into the same world. The geological story, the scientific credibility, the sustainability infrastructure, and the same customer all transfer completely.</p>
<div class="callout">
  <div class="callout-label">The convergence that makes this rare</div>
  <div class="callout-text">The volcanic basalt minerals that make the coffee cherries develop more complex sugars are the same minerals that make volcanic ash skincare products extraordinary. The jasmine-like arabica flower that becomes a fragrance note in the scent collection is a botanical ingredient for the perfume line. The shade tree ecosystem documented in the coffee brand's scientific program provides the botanical extract library for the skincare range. This is not a marketing claim — it is actual chemistry, and the brand is positioned to prove it at a level no competitor can match.</div>
</div>
<div class="slide-h2">How the Two Businesses Reinforce Each Other</div>
<div class="grid-2">
  <div class="card">
    <div class="card-icon">Coffee → Skincare & Perfume</div>
    <div class="card-title">Built foundation transfers</div>
    <div class="card-body">The geological IP. The scientific authority and academic partnerships. The documentary infrastructure and exhibition circuit. The Passport loyalty architecture. The local artist program. The Observatory aesthetic system. The Lao cultural relationships. All of it arrives fully formed for the second line.</div>
  </div>
  <div class="card">
    <div class="card-icon">Skincare & Perfume → Coffee</div>
    <div class="card-title">Expanded audience feeds back</div>
    <div class="card-body">A customer who discovers the volcanic mineral skincare range and traces it back to the plateau becomes a coffee customer. A coffee subscriber who receives the Crater Reserve discovers the perfume line in the same Observatory space. The two audiences overlap and grow each other.</div>
  </div>
</div>
<div class="slide-h2">The Shared Sensory World</div>
<div class="grid-3">
  <div class="card"><div class="card-icon">Sight</div><div class="card-body">Volcanic dark palette, geological illustration, amber typography, microscopy-derived art, scientific packaging aesthetic — identical across both lines.</div></div>
  <div class="card"><div class="card-icon">Smell</div><div class="card-body">The four signature scents bridge both worlds. The Flowering is a candle in the Observatory and a top note in the perfume. The Stone is a room diffuser and a mineral accord in a serum.</div></div>
  <div class="card"><div class="card-icon">Touch</div><div class="card-body">Embossed packaging, the weight of the tin, the cold smoothness of the tektite specimen, the texture of the provenance certificate — tactile language consistent across all products.</div></div>
</div>
<div class="callout coral">
  <div class="callout-label">The sequencing</div>
  <div class="callout-text">Build the coffee brand first. Let it establish the scientific authority and the cultural institution strategy. The botanical and mineral IP of the plateau will be properly documented through the coffee brand's scientific work — and that documentation becomes the foundation of the skincare and perfume formulation program. Each phase funds and validates the next.</div>
</div>`},

// ── 24. WHY NOW ───────────────────────────────────────────────────────
{tag:'Why Now',title:'Why Now',html:`
<div class="eyebrow">— Market Timing —</div>
<h1 class="slide-h1">The window<br>is open <em>now</em>.<br>It will not stay open.</h1>
<p class="slide-p">Five converging forces make this the precise moment to launch Bolaven Observatory. Miss this window and the territory gets claimed — not necessarily by a better brand, but by one that moves first.</p>
<div class="why-stat"><div class="why-num">11%</div><div class="why-label"><strong>Annual growth rate</strong> of the global specialty coffee market. Premium consumers are actively seeking origin transparency, scientific credibility, and verified sustainability — exactly what Bolaven is built on.</div></div>
<div class="why-stat"><div class="why-num">0</div><div class="why-label"><strong>Luxury-tier Southeast Asian coffee brands</strong> with genuine global presence. The window to become the Jamaican Blue Mountain or Ethiopian Yirgacheffe of Southeast Asia is open right now. Vietnamese, Lao, and Burmese beans currently end up in other brands' bags.</div></div>
<div class="why-stat"><div class="why-num">$5M+</div><div class="why-label"><strong>Slow Forest's recent investment round</strong> signals institutional capital is actively entering regenerative coffee. The infrastructure and investor appetite exist. The luxury consumer brand layer does not yet exist.</div></div>
<div class="why-stat"><div class="why-num">WaterBear</div><div class="why-label"><strong>and NatGeo's content appetite</strong> for Southeast Asian environmental and geological storytelling is at a peak. The documentary platform landscape has never been more receptive to exactly the kind of science-meets-origin story Bolaven owns.</div></div>
<div class="why-stat"><div class="why-num">Post-2024</div><div class="why-label"><strong>ESG reporting requirements</strong> across European and Singaporean corporate markets are creating immediate demand for premium hospitality partners with verified sustainability credentials. Bolaven's Slow Forest partnership structure addresses this directly.</div></div>
<div class="callout" style="margin-top:24px;">
  <div class="callout-label">The one timing risk</div>
  <div class="callout-text">The geological story, the tektite narrative, the volcanic origin — these are discoverable facts. Another brand could find them. The protection is not secrecy but speed and depth of execution. The brand that publishes the first peer-reviewed paper on Bolaven terroir, produces the first documentary series, and builds the first institutional loyalty ecosystem owns the territory permanently. That brand needs to be Bolaven Observatory. And it needs to start now.</div>
</div>`},
