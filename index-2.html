// ── 27. RISK & MITIGATION ─────────────────────────────────────────────
{tag:'Risk',title:'Risk & Mitigation',html:`
<div class="eyebrow">— Honest Assessment —</div>
<h1 class="slide-h1">The risks are real.<br>The <em>mitigations</em><br>are specific.</h1>
<p class="slide-p">Every ambitious brand faces execution, market, and operational risks. What separates serious projects from optimistic ones is having precise mitigation strategies rather than vague confidence. Here is the honest risk register.</p>
<div class="risk-matrix">
  <div class="risk-cell r-high">
    <div class="risk-cell-title">High impact risk</div>
    <div class="risk-name">Execution quality falls short of brand promise</div>
    <div class="risk-mit">Mitigation: Quality gates at every phase. Nothing launches until it meets the standard. Phased rollout means the Crater Reserve doesn't exist until the Signature line has proven the quality claim. The geological illustration is commissioned from a specialist — not a generalist or AI tool.</div>
  </div>
  <div class="risk-cell r-high">
    <div class="risk-cell-title">High impact risk</div>
    <div class="risk-name">Loyalty program technical failure at launch</div>
    <div class="risk-mit">Mitigation: 500-member beta launch with founding members before public rollout. Real-world testing of QR scanning, impact verification, tier mechanics, and Science Challenge platform. No public launch until the system is stable. Slow rollout is a feature, not a weakness.</div>
  </div>
  <div class="risk-cell r-med">
    <div class="risk-cell-title">Medium impact risk</div>
    <div class="risk-name">Pricing pressure from hospitality partners</div>
    <div class="risk-mit">Mitigation: The hospitality pitch is built around the story, not the price. A hotel that understands the tektite narrative is not comparing Bolaven to commodity coffee on a per-kilo basis. The Observatory Kit approach pre-sells the story before any price conversation happens.</div>
  </div>
  <div class="risk-cell r-med">
    <div class="risk-cell-title">Medium impact risk</div>
    <div class="risk-name">Slow Forest partnership terms dilute brand identity</div>
    <div class="risk-mit">Mitigation: The partnership is structured as a verified supplier relationship — Bolaven licenses their methodology, not their identity. Full creative and editorial independence is a non-negotiable condition from the first conversation. If they insist on co-branding, the partnership doesn't proceed.</div>
  </div>
  <div class="risk-cell r-med">
    <div class="risk-cell-title">Medium impact risk</div>
    <div class="risk-name">Documentary series takes longer than planned</div>
    <div class="risk-mit">Mitigation: Start filming immediately — even imperfectly. The short-form science content series (60–90 second episodes) can launch within 3 months and builds audience while the documentary is in production. The brand does not depend on the documentary to launch.</div>
  </div>
  <div class="risk-cell r-low">
    <div class="risk-cell-title">Lower impact risk</div>
    <div class="risk-name">Competitor enters the geological origin narrative</div>
    <div class="risk-mit">Mitigation: The peer-reviewed paper, the Science Quarterly archive, the documentary series, and the Bolaven Coffee Index — once published — establish Bolaven as the definitive authority on this origin. A competitor can reference the geology but cannot retroactively become the brand that documented it first.</div>
  </div>
</div>`}

  {title:'Vision & Assessment', items:[12,13,14]},
  {title:'Sensory & Art', items:[15,16,17]},
  {title:'The Full Universe', items:[18,19]},
  {title:'Business Case', items:[20,21,22,23,24,25,26,27]},
];

let current = 0;

// ── BUILD NAV ─────────────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('nav');
  navSections.forEach(sec => {
    const title = document.createElement('div');
    title.className = 'nav-section-title';
    title.textContent = sec.title;
    nav.appendChild(title);
    sec.items.forEach(idx => {
      if (idx >= slides.length) return;
      const item = document.createElement('div');
      item.className = 'nav-item' + (idx===0?' active':'');
      item.id = 'nav-'+idx;
      item.onclick = () => goTo(idx);
      item.innerHTML = `<span class="nav-num">${String(idx+1).padStart(2,'0')}</span><span class="nav-label">${slides[idx].title}</span>`;
      nav.appendChild(item);
    });
  });
}

// ── BUILD SLIDES ──────────────────────────────────────────────────────
function buildSlides() {
  const container = document.getElementById('slides');
  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i===0?' active':'');
    div.id = 'slide-'+i;
    div.innerHTML = s.html;
    container.appendChild(div);
  });
}

// ── NAVIGATE ──────────────────────────────────────────────────────────
function goTo(idx) {
  if (idx < 0 || idx >= slides.length) return;
  document.getElementById('slide-'+current).classList.remove('active');
  document.getElementById('nav-'+current).classList.remove('active');
  current = idx;
  const slide = document.getElementById('slide-'+current);
  slide.classList.add('active');
  slide.scrollTop = 0;
  document.getElementById('nav-'+current).classList.add('active');
  document.getElementById('nav-'+current).scrollIntoView({block:'nearest',behavior:'smooth'});
  document.getElementById('slide-title').textContent = slides[current].title;
  document.getElementById('slide-tag').textContent = slides[current].tag;
  document.getElementById('progress-text').textContent = `${current+1} / ${slides.length}`;
  document.getElementById('progress-fill').style.width = `${((current+1)/slides.length)*100}%`;
  document.getElementById('btn-prev').disabled = current===0;
  document.getElementById('btn-next').disabled = current===slides.length-1;
}

function navigate(dir) { goTo(current + dir); }

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  document.getElementById('toggle-label').textContent =
    sb.classList.contains('collapsed') ? '' : 'Collapse';
}

// ── KEYBOARD ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') navigate(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') navigate(-1);
});

// ── INIT ──────────────────────────────────────────────────────────────
buildNav();
buildSlides();
goTo(0);
</script>
</body>
</html>
